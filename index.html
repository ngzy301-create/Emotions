<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emotion Sorter</title>
<style>
  :root {
    --ink: #1b1b1f;
    --paper: #f6f5f2;
    --positive: #2f6f4f;
    --positive-bg: #e5f0e8;
    --negative: #9a3b3b;
    --negative-bg: #f4e6e4;
    --neutral: #55565e;
    --neutral-bg: #eceaea;
    --line: #d8d6d0;
    --accent: #3a4a9f;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }

  header {
    width: 100%;
    max-width: 720px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 48px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 16px;
  }

  header h1 {
    font-size: 1.3rem;
    letter-spacing: 0.02em;
    margin: 0;
  }

  .view-toggle button {
    background: none;
    border: 1px solid var(--ink);
    color: var(--ink);
    padding: 6px 14px;
    font-size: 0.85rem;
    cursor: pointer;
    border-radius: 3px;
  }
  .view-toggle button:hover { background: var(--ink); color: var(--paper); }

  /* ---- Sorter View ---- */
  #sorterView {
    width: 100%;
    max-width: 560px;
    text-align: center;
  }

  .prompt-label {
    font-size: 0.75rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--neutral);
    margin-bottom: 14px;
  }

  .emotion-word {
    font-size: 3rem;
    font-weight: 600;
    font-family: Georgia, 'Times New Roman', serif;
    margin: 0 0 48px;
    min-height: 70px;
  }

  .choices {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .choice-link {
    appearance: none;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
    padding: 16px 28px;
    border-radius: 6px;
    text-decoration: none;
    display: inline-block;
    transition: transform 0.12s ease;
  }
  .choice-link:hover { transform: translateY(-2px); }
  .choice-link:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
  .choice-link:disabled { opacity: 0.5; cursor: wait; transform: none; }

  .choice-positive { background: var(--positive-bg); color: var(--positive); }
  .choice-negative { background: var(--negative-bg); color: var(--negative); }
  .choice-neutral  { background: var(--neutral-bg);  color: var(--neutral); }

  .progress {
    margin-top: 40px;
    font-size: 0.85rem;
    color: var(--neutral);
  }

  .sync-note {
    margin-top: 6px;
    font-size: 0.72rem;
    color: #a3a2a0;
    letter-spacing: 0.03em;
  }

  .finished-msg {
    font-size: 1.2rem;
    color: var(--ink);
  }
  .finished-msg .again {
    display: inline-block;
    margin-top: 20px;
    font-size: 0.85rem;
    color: var(--accent);
    cursor: pointer;
    border: 1px solid var(--accent);
    padding: 6px 14px;
    border-radius: 3px;
    background: none;
  }

  /* ---- Admin View ---- */
  #adminView {
    width: 100%;
    max-width: 900px;
    display: none;
  }

  .admin-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .columns {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .column {
    background: white;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 18px;
    min-height: 260px;
  }

  .column-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 2px solid;
  }

  .column-header h2 { font-size: 0.95rem; margin: 0; letter-spacing: 0.03em; }
  .count-badge {
    font-size: 0.8rem;
    font-weight: 700;
    border-radius: 999px;
    padding: 2px 10px;
  }

  .col-positive .column-header { border-color: var(--positive); }
  .col-positive .count-badge { background: var(--positive-bg); color: var(--positive); }
  .col-negative .column-header { border-color: var(--negative); }
  .col-negative .count-badge { background: var(--negative-bg); color: var(--negative); }
  .col-neutral .column-header  { border-color: var(--neutral); }
  .col-neutral .count-badge  { background: var(--neutral-bg); color: var(--neutral); }

  .emotion-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 10px;
    font-size: 0.9rem;
    border-bottom: 1px solid var(--line);
    gap: 8px;
  }
  .emotion-item:last-child { border-bottom: none; }

  .emotion-name { display: flex; align-items: center; gap: 6px; }

  .tie-flag {
    font-size: 0.65rem;
    font-weight: 700;
    color: white;
    background: var(--accent);
    padding: 1px 6px;
    border-radius: 999px;
    letter-spacing: 0.03em;
  }

  .vote-tally {
    font-size: 0.75rem;
    color: #8a8a8a;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  .empty-note {
    font-size: 0.85rem;
    color: #999;
    font-style: italic;
  }

  .admin-footer {
    margin-top: 24px;
    text-align: right;
  }
  .reset-btn {
    background: none;
    border: 1px solid var(--negative);
    color: var(--negative);
    padding: 6px 14px;
    font-size: 0.8rem;
    border-radius: 3px;
    cursor: pointer;
  }
  .reset-btn:hover { background: var(--negative); color: white; }

  @media (max-width: 640px) {
    .columns { grid-template-columns: 1fr; }
    .emotion-word { font-size: 2.2rem; }
    .choices { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <h1>Emotion Sorter</h1>
  <div class="view-toggle">
    <button id="toggleBtn" onclick="toggleView()">Admin dashboard</button>
  </div>
</header>

<section id="sorterView">
  <div class="prompt-label">How would you classify this emotion?</div>
  <div class="emotion-word" id="emotionWord"></div>

  <div class="choices" id="choicesBox">
    <button class="choice-link choice-positive" onclick="classify('Positive')">Positive</button>
    <button class="choice-link choice-negative" onclick="classify('Negative')">Negative</button>
    <button class="choice-link choice-neutral" onclick="classify('Neutral')">Neutral</button>
  </div>

  <div class="progress" id="progressNote"></div>
  <div class="sync-note" id="syncNote">Connecting…</div>
</section>

<section id="adminView">
  <div class="admin-top">
    <div class="sync-note" id="syncNoteAdmin">Connecting…</div>
  </div>
  <div class="columns">
    <div class="column col-positive">
      <div class="column-header">
        <h2>Positive</h2>
        <span class="count-badge" id="countPositive">0</span>
      </div>
      <div id="listPositive"></div>
    </div>
    <div class="column col-negative">
      <div class="column-header">
        <h2>Negative</h2>
        <span class="count-badge" id="countNegative">0</span>
      </div>
      <div id="listNegative"></div>
    </div>
    <div class="column col-neutral">
      <div class="column-header">
        <h2>Neutral</h2>
        <span class="count-badge" id="countNeutral">0</span>
      </div>
      <div id="listNeutral"></div>
    </div>
  </div>
  <div class="admin-footer">
    <button class="reset-btn" onclick="resetAll()">Reset all votes</button>
  </div>
</section>

<script>
  // Pool of emotions to classify. Edit this list to change what's shown.
  const emotionPool = [
    "Joy", "Hatred", "Contentment", "Envy", "Relief", "Disappointment",
    "Affection", "Anxiety", "Awe", "Gratitude", "Excitement", "Admiration",
    "Sadness", "Curiosity", "Surprise", "Loneliness", "Compassion", "Hope",
    "Inspiration", "Guilt", "Amusement", "Wonder", "Trust", "Disgust",
    "Despair", "Shame", "Delight", "Fear", "Jealousy", "Pride",
    "Anger", "Frustration", "Resentment", "Confusion", "Love"
  ];

  const STORAGE_KEY = 'votes';
  const POLL_MS = 2500;
  const CATEGORIES = ['Positive', 'Negative', 'Neutral'];

  // Shared truth, synced with every other user of this page:
  // { emotion: { Positive: n, Negative: n, Neutral: n } }
  let votes = {};

  // This browser's own progress through the list (not shared) so the
  // same person isn't asked to vote on the same emotion twice in one visit.
  let votedThisSession = new Set();
  let currentEmotion = null;
  let syncing = false;

  function emptyCounts() {
    return { Positive: 0, Negative: 0, Neutral: 0 };
  }

  function getCounts(emotion) {
    return votes[emotion] || emptyCounts();
  }

  function getMajority(counts) {
    const total = counts.Positive + counts.Negative + counts.Neutral;
    if (total === 0) return null;
    const max = Math.max(counts.Positive, counts.Negative, counts.Neutral);
    const top = CATEGORIES.filter(c => counts[c] === max);
    return { category: top[0], tied: top.length > 1, total };
  }

  function getRemainingQueue() {
    return emotionPool.filter(e => !votedThisSession.has(e));
  }

  function setSyncNote(text) {
    document.getElementById('syncNote').textContent = text;
    document.getElementById('syncNoteAdmin').textContent = text;
  }

  function showNextEmotion() {
    const remaining = getRemainingQueue();
    if (remaining.length === 0) {
      document.getElementById('emotionWord').innerHTML =
        '<span class="finished-msg">You\'ve voted on every emotion.<br>' +
        '<button class="again" onclick="restartSession()">Vote through them again</button></span>';
      document.getElementById('choicesBox').style.display = 'none';
      document.getElementById('progressNote').textContent = '';
      currentEmotion = null;
      return;
    }
    document.getElementById('choicesBox').style.display = 'flex';
    currentEmotion = remaining[0];
    document.getElementById('emotionWord').textContent = currentEmotion;
    const total = emotionPool.length;
    document.getElementById('progressNote').textContent =
      `${total - remaining.length + 1} of ${total} · your progress`;
  }

  function setChoicesEnabled(enabled) {
    document.querySelectorAll('#choicesBox .choice-link').forEach(btn => btn.disabled = !enabled);
  }

  async function fetchShared() {
    try {
      const result = await window.storage.get(STORAGE_KEY, true);
      return result ? JSON.parse(result.value) : {};
    } catch (e) {
      // Key doesn't exist yet (nobody has voted on anything)
      return {};
    }
  }

  async function saveShared(obj) {
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(obj), true);
      return true;
    } catch (e) {
      console.error('Storage write failed', e);
      return false;
    }
  }

  async function classify(category) {
    if (!currentEmotion || syncing) return;
    const emotion = currentEmotion;
    syncing = true;
    setChoicesEnabled(false);

    // Optimistic local bump so the vote feels instant
    const localCounts = { ...getCounts(emotion) };
    localCounts[category] += 1;
    votes[emotion] = localCounts;
    votedThisSession.add(emotion);
    showNextEmotion();
    renderDashboard();

    // Merge with the latest shared tally before writing, so two people
    // voting at nearly the same moment don't erase each other's vote
    const latest = await fetchShared();
    const latestCounts = latest[emotion] || emptyCounts();
    latestCounts[category] += 1;
    latest[emotion] = latestCounts;

    const ok = await saveShared(latest);
    if (ok) {
      votes = latest;
      setSyncNote('Synced ' + new Date().toLocaleTimeString());
    } else {
      setSyncNote('Sync failed — will retry shortly');
    }
    renderDashboard();
    syncing = false;
    setChoicesEnabled(true);
  }

  function restartSession() {
    votedThisSession = new Set();
    showNextEmotion();
  }

  async function resetAll() {
    const entered = prompt("Enter admin password to reset all votes:");
    if (entered === null) return; // cancelled
    if (entered !== "admin") {
      alert("Incorrect password. Reset cancelled.");
      return;
    }
    votes = {};
    votedThisSession = new Set();
    await saveShared({});
    showNextEmotion();
    renderDashboard();
    setSyncNote('Reset ' + new Date().toLocaleTimeString());
  }

  function renderDashboard() {
    const buckets = { Positive: [], Negative: [], Neutral: [] };

    for (const emotion of Object.keys(votes)) {
      const counts = getCounts(emotion);
      const result = getMajority(counts);
      if (!result) continue;
      buckets[result.category].push({ emotion, counts, tied: result.tied });
    }

    for (const category of CATEGORIES) {
      const listEl = document.getElementById('list' + category);
      const countEl = document.getElementById('count' + category);
      const items = buckets[category];
      countEl.textContent = items.length;

      if (items.length === 0) {
        listEl.innerHTML = '<div class="empty-note">Nothing here yet.</div>';
      } else {
        listEl.innerHTML = items
          .sort((a, b) => a.emotion.localeCompare(b.emotion))
          .map(item => `
            <div class="emotion-item">
              <span class="emotion-name">${item.emotion}${item.tied ? '<span class="tie-flag">tie</span>' : ''}</span>
              <span class="vote-tally">${item.counts.Positive}-${item.counts.Negative}-${item.counts.Neutral}</span>
            </div>
          `)
          .join('');
      }
    }
  }

  function toggleView() {
    const sorter = document.getElementById('sorterView');
    const admin = document.getElementById('adminView');
    const btn = document.getElementById('toggleBtn');
    const isAdmin = admin.style.display === 'block';

    if (isAdmin) {
      admin.style.display = 'none';
      sorter.style.display = 'block';
      btn.textContent = 'Admin dashboard';
    } else {
      admin.style.display = 'block';
      sorter.style.display = 'none';
      btn.textContent = 'Back to sorting';
      renderDashboard();
    }
  }

  // Poll shared storage so every open tab/browser stays in sync live
  async function pollShared() {
    const remote = await fetchShared();
    if (JSON.stringify(remote) !== JSON.stringify(votes)) {
      votes = remote;
      renderDashboard();
    }
    setSyncNote('Synced ' + new Date().toLocaleTimeString());
  }

  // init
  (async function init() {
    votes = await fetchShared();
    showNextEmotion();
    renderDashboard();
    setSyncNote('Synced ' + new Date().toLocaleTimeString());
    setInterval(pollShared, POLL_MS);
  })();
</script>

</body>
</html>
